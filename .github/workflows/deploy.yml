name: Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Create deployment archive
      run: |
        tar --exclude='node_modules' --exclude='.git' --exclude='.DS_Store' --exclude='*.tar.gz' --exclude='.github' -czf moteeva-deploy.tar.gz . || ([ $? -eq 1 ] && exit 0 || exit $?)

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known hosts
      run: |
        ssh-keyscan -H 57-105796.ssh.hosting-ik.com >> ~/.ssh/known_hosts

    - name: Transfer files to server
      run: |
        scp moteeva-deploy.tar.gz dS7BhMKpcsV_moteeva@57-105796.ssh.hosting-ik.com:~/

    - name: Deploy on server
      run: |
        ssh dS7BhMKpcsV_moteeva@57-105796.ssh.hosting-ik.com << 'EOF'
          cd /srv/customer/apps/moteeva
          rm -rf * .[^.]* 2>/dev/null || true
          tar -xzf ~/moteeva-deploy.tar.gz
          rm ~/moteeva-deploy.tar.gz
          npm ci --production
          pm2 restart moteeva || pm2 start .svelte-kit/output/server/index.js --name moteeva
          pm2 save
        EOF


name: Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Create deployment archive
      run: |
        tar --exclude='node_modules' --exclude='.git' --exclude='.DS_Store' --exclude='*.tar.gz' --exclude='.github' -czf moteeva-deploy.tar.gz . || ([ $? -eq 1 ] && exit 0 || exit $?)

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/deploy_key

    - name: Transfer files to server
      run: |
        scp -i ~/.ssh/deploy_key -P 3000 -o StrictHostKeyChecking=no moteeva-deploy.tar.gz dS7BhMKpcsV_moteeva@185.125.27.88:~/

    - name: Deploy on server
      run: |
        ssh -i ~/.ssh/deploy_key -p 3000 -o StrictHostKeyChecking=no dS7BhMKpcsV_moteeva@185.125.27.88 << 'EOF'
          cd /srv/customer/apps/moteeva
          rm -rf * .[^.]* 2>/dev/null || true
          tar -xzf ~/moteeva-deploy.tar.gz
          rm ~/moteeva-deploy.tar.gz
          npm ci --production
          pm2 restart moteeva || pm2 start .svelte-kit/output/server/index.js --name moteeva
          pm2 save
        EOF

    - name: Cleanup
      if: always()
      run: rm -f ~/.ssh/deploy_key


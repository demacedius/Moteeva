name: Deploy to Infomaniak

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Create deployment archive
      run: |
        tar --exclude='node_modules' --exclude='.git' --exclude='.DS_Store' -czf moteeva-deploy.tar.gz .

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H 57-105796.ssh.hosting-ik.com >> ~/.ssh/known_hosts

    - name: Transfer files to server
      run: |
        scp moteeva-deploy.tar.gz dS7BhMKpcsV_moteeva@57-105796.ssh.hosting-ik.com:~/

    - name: Deploy on server
      run: |
        ssh dS7BhMKpcsV_moteeva@57-105796.ssh.hosting-ik.com << 'EOF'
          cd /srv/customer/apps/moteeva
          rm -rf * .[^.]* 2>/dev/null || true
          tar -xzf ~/moteeva-deploy.tar.gz
          rm ~/moteeva-deploy.tar.gz
          npm ci --production
          pm2 restart moteeva || pm2 start .svelte-kit/output/server/index.js --name moteeva
          pm2 save
        EOF

    - name: Cleanup
      run: rm -f ~/.ssh/id_rsa
